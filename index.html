<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우정 파괴 카드 맞추기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* 카드 3D 뒤집기 효과를 위한 CSS */
        .perspective-1000 {
            perspective: 1000px;
        }
        .transform-style-3d {
            transform-style: preserve-3d;
        }
        .backface-hidden {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden; /* Safari 지원 */
        }
        .rotate-y-180 {
            transform: rotateY(180deg);
        }
        
        .card-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        }
        
        /* 카드가 뒤집혔을 때의 상태 */
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        /* 매칭된 카드는 약간 투명해지고 튀어오르는 효과 */
        .card.matched {
            opacity: 0.6;
            transform: scale(0.95);
            transition: all 0.3s ease;
        }

        /* 카드 앞면(사진) 이미지 설정 */
        .card-front {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex flex-col">

    <!-- 헤더 영역 -->
    <header class="bg-white shadow-sm py-4 px-6 text-center z-10 sticky top-0">
        <h1 class="text-2xl md:text-3xl font-black text-gray-800 tracking-tight">🤯 우정 파괴 메모리 게임</h1>
        <div class="mt-2 flex justify-center items-center space-x-6 text-sm font-semibold text-gray-600">
            <p>시도 횟수: <span id="moves" class="text-blue-600 text-lg">0</span></p>
            <button id="restart-btn" class="bg-gray-200 hover:bg-gray-300 text-gray-700 py-1 px-3 rounded-full transition duration-200">
                다시 시작
            </button>
        </div>
    </header>

    <!-- 게임 보드 영역 -->
    <main class="flex-1 flex justify-center items-center p-4">
        <!-- 5x4 그리드 (모바일에서는 카드가 작아짐) -->
        <div id="game-board" class="grid grid-cols-4 md:grid-cols-5 gap-2 md:gap-4 w-full max-w-4xl mx-auto">
            <!-- 자바스크립트로 카드가 생성되어 여기에 들어갑니다 -->
        </div>
    </main>

    <!-- 승리 모달창 -->
    <div id="win-modal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex justify-center items-center z-50">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-[90%] text-center transform scale-95 transition-transform duration-300">
            <h2 class="text-3xl font-black text-gray-800 mb-4">🎉 게임 클리어!</h2>
            <p class="text-gray-600 mb-6">총 <span id="final-moves" class="font-bold text-blue-600 text-xl"></span> 번의 시도 만에 친구들의 얼굴을 모두 맞췄습니다!</p>
            <button id="play-again-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition duration-200">
                한 판 더 하기
            </button>
        </div>
    </div>

    <script>
        /**
         * [중요] 이미지 파일 설정
         * 깃허브에 올릴 때, 10장의 사진 파일 이름을 아래 배열과 똑같이 맞춰서
         * 이 HTML 파일과 같은 폴더에 업로드하세요. (예: 1.jpeg, 2.jpeg ...)
         * 해상도는 카카오톡으로 전송해서 용량을 줄이거나 500x500 픽셀 정도로 자르는 것을 추천합니다.
         */
        const imageFiles = [
            '1.jpeg', '2.jpeg', '3.jpeg', '4.jpeg', '5.jpeg',
            '6.jpeg', '7.jpeg', '8.jpeg', '9.jpeg', '10.jpeg'
        ];

        const gameBoard = document.getElementById('game-board');
        const movesDisplay = document.getElementById('moves');
        const winModal = document.getElementById('win-modal');
        const finalMovesDisplay = document.getElementById('final-moves');
        
        let cards = [];
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;
        const totalPairs = imageFiles.length;

        // 게임 초기화 함수
        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            winModal.classList.add('hidden');
            winModal.children[0].classList.replace('scale-100', 'scale-95');

            // 카드 2장씩 쌍으로 만들기
            let deck = [...imageFiles, ...imageFiles];
            // 카드 섞기 (Fisher-Yates 알고리즘)
            deck = deck.sort(() => Math.random() - 0.5);

            // HTML 카드 요소 생성
            deck.forEach((imagePath, index) => {
                const card = document.createElement('div');
                // 반응형 카드 크기 설정 (비율 유지)
                card.classList.add('card', 'perspective-1000', 'cursor-pointer', 'relative', 'aspect-[3/4]', 'w-full');
                card.dataset.image = imagePath;

                card.innerHTML = `
                    <div class="card-inner w-full h-full relative transform-style-3d rounded-xl shadow-md">
                        <!-- 카드 뒷면 (클릭 전 보이는 면) -->
                        <div class="card-back absolute w-full h-full backface-hidden bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center border-4 border-white">
                            <span class="text-white text-4xl opacity-50">?</span>
                        </div>
                        <!-- 카드 앞면 (사진) -->
                        <div class="card-front absolute w-full h-full backface-hidden rotate-y-180 rounded-xl bg-white border-4 border-white shadow-inner overflow-hidden" 
                             style="background-image: url('${imagePath}');">
                        </div>
                    </div>
                `;

                card.addEventListener('click', flipCard);
                gameBoard.appendChild(card);
            });
        }

        // 카드 뒤집기 함수
        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flipped');

            if (!hasFlippedCard) {
                // 첫 번째 클릭
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            // 두 번째 클릭
            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        // 짝이 맞는지 확인
        function checkForMatch() {
            let isMatch = firstCard.dataset.image === secondCard.dataset.image;

            if (isMatch) {
                disableCards();
            } else {
                unflipCards();
            }
        }

        // 짝이 맞았을 때 처리
        function disableCards() {
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);

            // 매칭된 효과 주기
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');

            matchedPairs++;
            
            if (matchedPairs === totalPairs) {
                setTimeout(gameWin, 500);
            }

            resetBoard();
        }

        // 짝이 틀렸을 때 원래대로 뒤집기
        function unflipCards() {
            lockBoard = true;

            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                resetBoard();
            }, 1000); // 1초 뒤에 뒤집힘
        }

        // 상태 초기화
        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        // 게임 승리 처리
        function gameWin() {
            finalMovesDisplay.innerText = moves;
            winModal.classList.remove('hidden');
            setTimeout(() => {
                winModal.children[0].classList.replace('scale-95', 'scale-100');
            }, 10);
            
            // 축하 폭죽 효과
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };

            function randomInRange(min, max) {
              return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
              var timeLeft = animationEnd - Date.now();

              if (timeLeft <= 0) {
                return clearInterval(interval);
              }

              var particleCount = 50 * (timeLeft / duration);
              confetti(Object.assign({}, defaults, { particleCount,
                origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }
              }));
              confetti(Object.assign({}, defaults, { particleCount,
                origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }
              }));
            }, 250);
        }

        // 버튼 이벤트 리스너
        document.getElementById('restart-btn').addEventListener('click', initGame);
        document.getElementById('play-again-btn').addEventListener('click', initGame);

        // 게임 최초 실행
        initGame();
    </script>
</body>
</html>
